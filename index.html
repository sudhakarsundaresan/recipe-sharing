<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simmer — Recipes worth passing down</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --page-bg: #F5EFDF;
    --primary: #4B6B4F;
    --accent: #C1694F;
    --ink: #362B1F;
    --muted: #8A7A62;
    --body-text: #4A3E2C;
    --card-bg: #FFFDF7;
    --input-bg: #FBF8F0;
    --panel-bg: #F1EAD9;
    --border: rgba(54,43,31,0.08);
    --border-strong: rgba(54,43,31,0.15);
    --star-empty: #E3DAC4;
    --error: #B4552F;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Work Sans',sans-serif; background:var(--page-bg); color:var(--ink); }
  input, textarea, select, button { font-family:'Work Sans',sans-serif; }
  ::placeholder { color:#B3A588; }
  a { color:inherit; }
  .serif { font-family:'Spectral',serif; }
  @keyframes toastIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .field {
    padding:12px 14px; border-radius:10px; border:1px solid var(--border-strong);
    font-size:14px; outline:none; background:var(--input-bg); width:100%;
  }
  .field:focus { border-color: var(--primary); }
  textarea.field { resize: vertical; }
  label.field-label { font-size:12.5px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px; }

  .btn { border:none; border-radius:20px; font-size:14px; font-weight:600; cursor:pointer; padding:10px 18px; transition: transform .15s ease, box-shadow .15s ease; }
  .btn:active { transform: scale(0.97); }
  .btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-accent:hover { box-shadow: 0 8px 20px rgba(193,105,79,0.35); }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-primary:hover { box-shadow: 0 8px 20px rgba(75,107,79,0.3); }
  .btn-outline { background:#fff; border:1px solid var(--border-strong); color:var(--ink); }
  .btn-outline:hover { background:#fbf8f0; }

  .card { background:var(--card-bg); border-radius:16px; border:1px solid var(--border); box-shadow:0 6px 20px rgba(54,43,31,0.06); }
  .chip { background:var(--panel-bg); border-radius:20px; padding:7px 14px; font-size:12.5px; color:var(--body-text); display:inline-block; }

  #app { min-height:100vh; }
  .center-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; }

  .logo-row { display:flex; align-items:center; gap:10px; }
  .header { display:flex; align-items:center; gap:20px; padding:16px 40px; background:var(--card-bg); border-bottom:3px solid var(--primary); position:sticky; top:0; z-index:10; }
  .header .search-wrap { flex:1; max-width:420px; position:relative; display:flex; align-items:center; gap:8px; }

  .recipe-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:28px; }
  .recipe-card { background:var(--card-bg); border-radius:16px; overflow:hidden; border:1px solid var(--border); box-shadow:0 6px 20px rgba(54,43,31,0.06); cursor:pointer; display:flex; flex-direction:column; transition:transform .18s ease, box-shadow .18s ease; }
  .recipe-card:hover { transform:translateY(-5px); box-shadow:0 16px 34px rgba(54,43,31,0.14); }
  .recipe-card:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
  .recipe-cover { width:100%; aspect-ratio:4/3; position:relative; background-size:cover; background-position:center; }
  .badge { position:absolute; top:10px; padding:5px 11px; border-radius:14px; font-size:11.5px; font-weight:600; }
  .badge-diet { left:10px; background:rgba(255,253,247,0.92); color:var(--primary); }
  .badge-source { right:10px; background:rgba(54,43,31,0.75); color:#fff; }
  .stars { display:inline-flex; align-items:center; gap:3px; }
  .stars svg { display:block; }

  .toast { position:fixed; bottom:28px; right:28px; max-width:360px; background:var(--ink); color:#fff; padding:14px 22px; border-radius:12px; font-size:14px; line-height:1.5; box-shadow:0 10px 30px rgba(0,0,0,0.25); animation:toastIn .2s ease; z-index:50; }
  .toast.toast-error { background:var(--error); }
  .overlay-backdrop { position:fixed; inset:0; background:rgba(54,43,31,0.45); display:flex; align-items:center; justify-content:center; z-index:100; }

  .filter-panel { position:absolute; top:46px; left:0; width:300px; background:var(--card-bg); border-radius:14px; box-shadow:0 16px 40px rgba(54,43,31,0.18); border:1px solid var(--border); padding:18px; z-index:30; display:flex; flex-direction:column; gap:14px; }
  .filter-check { display:flex; align-items:center; gap:10px; font-size:13.5px; cursor:pointer; }

  .avatar { border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; flex:none; }

  @media (max-width: 860px) {
    .two-col { grid-template-columns: 1fr !important; }
    .four-col { grid-template-columns: 1fr 1fr !important; }
    .header { padding:12px 16px; flex-wrap:wrap; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  const AI_GRADIENTS = [
    'linear-gradient(135deg, #cfe8d8, #f7e7b8)',
    'linear-gradient(135deg, #f9d8c0, #cfe3ea)',
    'linear-gradient(135deg, #e3d6f0, #cfe8d8)',
    'linear-gradient(135deg, #f6e2b3, #d7ecec)',
  ];

  const state = {
    screen: 'loading',
    authMode: 'login',
    authError: '',
    currentUser: null,
    myRecipeCount: 0,
    recipes: [],
    query: '', sortRecent: false, veganOnly: false, vegetarianOnly: false, ingredientQuery: '', filterPanelOpen: false,
    selectedId: null, selectedRecipe: null,
    toast: '', toastType: 'info',
    uploadMode: 'own',
    draft: { title: '', story: '', cookTime: '', servings: '', difficulty: 'Easy', diet: 'omnivore', ingredients: [''], steps: [''], heroKind: 'photo', aiVariant: 0, sourceUrl: '' },
    draftError: '',
    extracting: false, extractProgress: 0, extractMode: 'youtube',
    myRecipes: [],
  };

  const app = document.getElementById('app');
  let toastTimer = null;
  let extractTimer = null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  async function api(path, opts) {
    opts = opts || {};
    const res = await fetch('/api' + path, {
      method: opts.method || 'GET',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    let data = {};
    try { data = await res.json(); } catch (e) { /* empty body */ }
    if (!res.ok) throw new Error(data.error || 'Something went wrong.');
    return data;
  }

  function showToast(msg, type) {
    clearTimeout(toastTimer);
    state.toast = msg;
    state.toastType = type || 'info';
    render();
    toastTimer = setTimeout(() => { state.toast = ''; render(); }, type === 'error' ? 4500 : 2600);
  }

  function setState(patch) { Object.assign(state, patch); render(); }

  // ---------- shared bits ----------

  function logoSvg(size) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none"><path d="M4 11c0 4.4 3.6 8 8 8s8-3.6 8-8H4z" fill="var(--primary)"/><path d="M12 3c-.6 1.6-1 2.6-1 3.5 0 1 .6 1.5 1 1.5s1-.5 1-1.5c0-.9-.4-1.9-1-3.5z" fill="var(--accent)"/></svg>`;
  }

  function starSvg(filled, size, extraAttrs) {
    const color = filled ? 'var(--accent)' : 'var(--star-empty)';
    return `<svg ${extraAttrs || ''} width="${size}" height="${size}" viewBox="0 0 20 20"><path d="M10 1l2.6 5.9 6.4.6-4.8 4.3 1.5 6.2L10 14.8 4.3 18l1.5-6.2L1 7.5l6.4-.6z" fill="${color}"/></svg>`;
  }

  function starsRow(avg, size, clickable) {
    const rounded = Math.round(avg);
    let out = `<span class="stars">`;
    for (let n = 1; n <= 5; n++) {
      const attrs = clickable ? `data-action="rate" data-n="${n}" style="cursor:pointer;"` : '';
      out += starSvg(n <= rounded, size, attrs);
    }
    out += `</span>`;
    return out;
  }

  function dietLabel(diet) {
    if (diet === 'vegan') return '🌱 Vegan';
    if (diet === 'vegetarian') return 'Vegetarian';
    return '';
  }

  function coverStyle(r) {
    if (r.heroKind === 'ai') {
      return `background:${AI_GRADIENTS[r.aiVariant % AI_GRADIENTS.length]};display:flex;align-items:center;justify-content:center;`;
    }
    const url = `https://placehold.co/600x450/EDE6D6/4B6B4F?text=${encodeURIComponent(r.title.slice(0, 24))}`;
    return `background-image:url('${url}');`;
  }

  function recipeCardHtml(r, opts) {
    opts = opts || {};
    const dietBadge = dietLabel(r.diet) ? `<div class="badge badge-diet">${esc(dietLabel(r.diet))}</div>` : '';
    const sourceBadge = r.sourceType === 'youtube' ? '▶ YouTube' : r.sourceType === 'link' ? '🔗 Web recipe' : '';
    const sourceBadgeHtml = sourceBadge ? `<div class="badge badge-source">${esc(sourceBadge)}</div>` : '';
    const aiTag = r.heroKind === 'ai' ? `<span style="font-size:12px;font-weight:600;color:rgba(54,43,31,0.55);background:rgba(255,255,255,0.6);padding:6px 12px;border-radius:16px;">✨ AI-generated cover</span>` : '';
    const story = (r.story || '').length > 90 ? esc(r.story).slice(0, 90) + '…' : esc(r.story || '');
    return `
      <div class="recipe-card" tabindex="0" role="button" data-action="open-recipe" data-id="${r.id}">
        <div class="recipe-cover" style="${coverStyle(r)}">${dietBadge}${sourceBadgeHtml}${aiTag}</div>
        <div style="padding:18px 20px 20px;display:flex;flex-direction:column;gap:8px;">
          <div class="serif" style="font-size:19px;font-weight:600;line-height:1.25;">${esc(r.title)}</div>
          <div style="font-size:12.5px;color:var(--muted);">${opts.showAuthor === false ? '' : 'by ' + esc(r.author) + ' · '}${esc(r.cookTime)} min · ${esc(r.difficulty)}</div>
          ${opts.showStory !== false ? `<div style="font-size:13px;color:#6B5B3A;font-style:italic;line-height:1.4;">${story}</div>` : ''}
          <div style="display:flex;align-items:center;gap:4px;margin-top:2px;">
            ${starsRow(r.avg, 14, false)}
            <span style="font-size:12.5px;color:var(--muted);margin-left:4px;">${r.avg ? r.avg.toFixed(1) : '—'} (${r.ratingCount})</span>
          </div>
        </div>
      </div>`;
  }

  // ---------- render ----------

  function render() {
    if (state.screen === 'loading') { app.innerHTML = ''; return; }
    if (state.screen === 'login') { app.innerHTML = renderAuth(); return; }
    if (state.screen === 'welcome') { app.innerHTML = renderWelcome(); return; }

    let content = '';
    if (state.extracting) content = renderExtracting();
    else if (state.screen === 'browse') content = renderBrowse();
    else if (state.screen === 'detail') content = renderDetail();
    else if (state.screen === 'upload') content = renderUpload();
    else if (state.screen === 'profile') content = renderProfile();

    const toastClass = state.toastType === 'error' ? 'toast toast-error' : 'toast';
    app.innerHTML = renderHeader() + content + (state.toast ? `<div class="${toastClass}">${esc(state.toast)}</div>` : '');
  }

  function renderAuth() {
    const isSignup = state.authMode === 'signup';
    return `
    <div class="center-screen" style="background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.6),transparent 60%),var(--page-bg);">
      <div style="width:100%;max-width:400px;background:var(--card-bg);border-radius:20px;box-shadow:0 20px 60px rgba(54,43,31,0.14);padding:40px 36px;border:1px solid var(--border);">
        <div class="logo-row" style="justify-content:center;margin-bottom:6px;">${logoSvg(30)}<div class="serif" style="font-size:26px;font-weight:600;">Simmer</div></div>
        <div style="text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px;">Recipes worth passing down</div>
        <div style="display:flex;gap:6px;background:var(--panel-bg);border-radius:12px;padding:4px;margin-bottom:24px;">
          <button data-action="set-login-mode" style="flex:1;border:none;border-radius:9px;padding:10px 0;font-size:14px;font-weight:600;cursor:pointer;background:${!isSignup ? 'var(--card-bg)' : 'transparent'};color:${!isSignup ? 'var(--ink)' : 'var(--muted)'};">Log in</button>
          <button data-action="set-signup-mode" style="flex:1;border:none;border-radius:9px;padding:10px 0;font-size:14px;font-weight:600;cursor:pointer;background:${isSignup ? 'var(--card-bg)' : 'transparent'};color:${isSignup ? 'var(--ink)' : 'var(--muted)'};">Sign up</button>
        </div>
        <form data-form="auth" style="display:flex;flex-direction:column;gap:14px;">
          ${isSignup ? `<div><label class="field-label">Name</label><input class="field" name="name" placeholder="Elin Whitfield"/></div>` : ''}
          <div><label class="field-label">Email</label><input class="field" type="text" name="email" placeholder="you@example.com" autocapitalize="none" autocorrect="off"/></div>
          <div><label class="field-label">Password</label><input class="field" type="password" name="password" placeholder="••••••••"/></div>
          ${state.authError ? `<div style="font-size:12.5px;color:var(--error);">${esc(state.authError)}</div>` : ''}
          <button type="submit" class="btn btn-primary" style="margin-top:6px;padding:13px 0;border-radius:10px;font-size:15px;">${isSignup ? 'Create account' : 'Log in'}</button>
        </form>
        <div style="text-align:center;margin-top:18px;font-size:12px;color:var(--muted);">Demo accounts use password <b>simmer-demo</b> (e.g. mira.chen@example.com)</div>
      </div>
    </div>`;
  }

  function renderWelcome() {
    const name = state.currentUser ? state.currentUser.name : '';
    const items = [
      ['📖', 'Share your recipes', 'Write out your own dishes, or share a favorite YouTube video or blog post you love.'],
      ['🔎', 'Discover new dishes', 'Search and filter by diet or ingredient to find recipes from home cooks everywhere.'],
      ['⭐', 'Rate and comment', 'Leave a star rating and a comment on any recipe you try.'],
      ['💌', 'Share with others', 'Copy a link or send any recipe straight to WhatsApp or X.'],
    ];
    return `
    <div class="center-screen" style="padding:56px 32px;background:radial-gradient(ellipse at 70% 15%,rgba(255,255,255,0.65),transparent 60%),var(--page-bg);text-align:center;">
      <div style="max-width:660px;">
        <div class="logo-row" style="justify-content:center;margin-bottom:18px;">${logoSvg(34)}<div class="serif" style="font-size:24px;font-weight:600;">Simmer</div></div>
        <div class="serif" style="font-size:38px;font-weight:600;margin-bottom:14px;line-height:1.2;">Welcome to Simmer, ${esc(name)}!</div>
        <div style="font-size:16px;line-height:1.7;color:var(--body-text);margin-bottom:40px;max-width:520px;margin-left:auto;margin-right:auto;">You've just joined a kitchen table for home cooks everywhere. Here's what you can do next.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:44px;text-align:left;" class="two-col">
          ${items.map(([icon, title, desc]) => `
            <div class="card" style="padding:22px;">
              <div style="font-size:22px;margin-bottom:8px;">${icon}</div>
              <div class="serif" style="font-size:16px;font-weight:600;margin-bottom:6px;">${title}</div>
              <div style="font-size:13.5px;color:var(--muted);line-height:1.5;">${desc}</div>
            </div>`).join('')}
        </div>
        <button data-action="enter-app" class="btn btn-accent" style="padding:15px 32px;font-size:15.5px;">Start exploring recipes →</button>
      </div>
    </div>`;
  }

  function renderHeader() {
    const hasActiveFilters = state.sortRecent || state.veganOnly || state.vegetarianOnly || !!state.ingredientQuery.trim();
    const filterOn = state.filterPanelOpen || hasActiveFilters;
    const initial = state.currentUser ? state.currentUser.name.charAt(0).toUpperCase() : '?';
    return `
    <div class="header">
      <div class="logo-row" style="cursor:pointer;" data-action="go-browse">${logoSvg(22)}<div class="serif" style="font-size:20px;font-weight:600;">Simmer</div></div>
      <div class="search-wrap">
        <input class="field" style="border-radius:20px;background:var(--panel-bg);" data-live="query" placeholder="Search recipes..." value="${esc(state.query)}"/>
        <button data-action="toggle-filter-panel" style="position:relative;width:38px;height:38px;flex:none;border-radius:50%;border:1px solid var(--border-strong);background:${filterOn ? 'var(--primary)' : '#fff'};cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${filterOn ? '#fff' : 'var(--body-text)'}" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M8 12h8M11 18h2"/></svg>
          ${hasActiveFilters ? `<div style="position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--accent);"></div>` : ''}
        </button>
        ${state.filterPanelOpen ? renderFilterPanel(hasActiveFilters) : ''}
      </div>
      <div style="flex:1;"></div>
      <button data-action="go-upload" class="btn btn-accent" style="white-space:nowrap;">+ Share a recipe</button>
      <div class="avatar" data-action="go-profile" style="width:38px;height:38px;font-size:14px;cursor:pointer;">${esc(initial)}</div>
      <div data-action="logout" style="font-size:13px;color:var(--muted);cursor:pointer;">Log out</div>
    </div>`;
  }

  function renderFilterPanel(hasActiveFilters) {
    return `
    <div class="filter-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:13px;font-weight:600;">Filter recipes</span>
        <span data-action="toggle-filter-panel" style="cursor:pointer;color:var(--muted);font-size:14px;">✕</span>
      </div>
      <label class="filter-check"><input type="checkbox" data-toggle="sortRecent" ${state.sortRecent ? 'checked' : ''}/> Most recently added</label>
      <label class="filter-check"><input type="checkbox" data-toggle="veganOnly" ${state.veganOnly ? 'checked' : ''}/> 🌱 Vegan only</label>
      <label class="filter-check"><input type="checkbox" data-toggle="vegetarianOnly" ${state.vegetarianOnly ? 'checked' : ''}/> Vegetarian</label>
      <div>
        <label class="field-label">By ingredient</label>
        <input class="field" style="font-size:13px;padding:9px 12px;" data-live="ingredientQuery" placeholder="e.g. beef, asparagus" value="${esc(state.ingredientQuery)}"/>
      </div>
      ${hasActiveFilters ? `<div data-action="clear-filters" style="font-size:12.5px;color:var(--primary);cursor:pointer;font-weight:600;text-align:right;">Clear all filters</div>` : ''}
    </div>`;
  }

  function filteredRecipes() {
    let list = state.recipes.filter((r) => {
      if (state.query.trim()) {
        const hay = (r.title + ' ' + r.author + ' ' + (r.story || '')).toLowerCase();
        if (!hay.includes(state.query.trim().toLowerCase())) return false;
      }
      if (state.veganOnly && r.diet !== 'vegan') return false;
      if (state.vegetarianOnly && r.diet !== 'vegetarian' && r.diet !== 'vegan') return false;
      if (state.ingredientQuery.trim()) {
        const q = state.ingredientQuery.trim().toLowerCase();
        if (!(r.ingredients || []).some((ing) => ing.toLowerCase().includes(q))) return false;
      }
      return true;
    });
    if (state.sortRecent) list = [...list].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    return list;
  }

  function renderBrowse() {
    const list = filteredRecipes();
    return `
    <div style="position:relative;overflow:hidden;">
      <div style="max-width:1180px;margin:0 auto;padding:44px 40px 80px;position:relative;">
        <div class="serif" style="font-size:34px;font-weight:600;margin-bottom:6px;">Recipes worth returning to</div>
        <div style="color:var(--muted);font-size:15px;margin-bottom:34px;">Shared by home cooks, one story at a time.</div>
        <div id="recipe-grid" class="recipe-grid">${list.map((r) => recipeCardHtml(r)).join('')}</div>
        ${list.length === 0 ? `<div style="text-align:center;padding:60px 0;color:var(--muted);font-size:15px;">No recipes match your filters yet.</div>` : ''}
      </div>
    </div>`;
  }

  function refreshGrid() {
    const grid = document.getElementById('recipe-grid');
    if (!grid) return;
    const list = filteredRecipes();
    grid.innerHTML = list.map((r) => recipeCardHtml(r)).join('');
    const wrap = grid.parentElement;
    let emptyDiv = wrap.querySelector('.empty-state');
    if (list.length === 0 && !emptyDiv) {
      emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-state';
      emptyDiv.style.cssText = 'text-align:center;padding:60px 0;color:var(--muted);font-size:15px;';
      emptyDiv.textContent = 'No recipes match your filters yet.';
      wrap.appendChild(emptyDiv);
    } else if (list.length > 0 && emptyDiv) {
      emptyDiv.remove();
    }
  }

  function renderDetail() {
    const r = state.selectedRecipe;
    if (!r) return `<div style="padding:60px;text-align:center;color:var(--muted);">Loading…</div>`;
    const diet = dietLabel(r.diet);
    const isOwn = r.sourceType === 'own';
    const isYoutube = r.sourceType === 'youtube';
    const isLink = r.sourceType === 'link';
    const heroStyle = r.heroKind === 'ai'
      ? `background:${AI_GRADIENTS[r.aiVariant % AI_GRADIENTS.length]};display:flex;align-items:center;justify-content:center;`
      : `background-image:url('https://placehold.co/900x600/EDE6D6/4B6B4F?text=${encodeURIComponent(r.title.slice(0, 30))}');background-size:cover;background-position:center;`;
    const aiTag = r.heroKind === 'ai' ? `<span style="font-size:13px;font-weight:600;color:rgba(54,43,31,0.55);background:rgba(255,255,255,0.6);padding:7px 14px;border-radius:16px;">✨ AI-generated cover</span>` : '';

    return `

          </div>

        ${state.draftError ? `

  function rowHtml(kind, i, value, placeholder, isTextarea) {

    return `<div style="display:flex;gap:8px;">${field}<button type="button" data-action="remove-${kind}" data-index="${i}" style="width:38px;border:1px solid var(--border-strong);background:#fff;border-radius:10px;cursor:pointer;color:var(--muted);">×</button></div>`;
  }

  function renderExtracting() {
    const subtext = state.extractMode === 'youtube'
      ? 'Transcribing the video and asking our recipe assistant to pull out ingredients and steps — this can take up to a minute…'
      : 'Reading the page and pulling out ingredients and steps…';
    return `
    <div class="overlay-backdrop">
      <div class="card" style="padding:40px 44px;max-width:420px;width:90%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.3);">
        <div style="font-size:32px;margin-bottom:14px;">✨</div>
        <div class="serif" style="font-size:20px;font-weight:600;margin-bottom:10px;">Working on extracting the recipe…</div>
        <div style="font-size:13.5px;color:var(--muted);margin-bottom:22px;line-height:1.5;">${subtext}</div>
        <div style="width:100%;height:8px;border-radius:4px;background:var(--panel-bg);overflow:hidden;">

        </div>
      </div>

  function renderProfile() {

    const initial = u ? u.name.charAt(0).toUpperCase() : '?';
    return `
    <div style="max-width:1180px;margin:0 auto;padding:44px 40px 90px;">

        <div class="avatar" style="width:76px;height:76px;font-size:26px;">${esc(initial)}</div>
        <div>
          <div class="serif" style="font-size:28px;font-weight:600;">${esc(u ? u.name : '')}</div>
          <div style="font-size:13.5px;color:var(--muted);">${esc(u ? u.email : '')} · ${state.myRecipeCount} recipe${state.myRecipeCount === 1 ? '' : 's'}</div>

      </div>
      <div class="serif" style="font-size:20px;font-weight:600;margin-bottom:20px;">Recipes by ${esc(u ? u.name : '')}</div>
      ${state.myRecipes.length ? `
        <div class="recipe-grid">${state.myRecipes.map((r) => recipeCardHtml(r, { showAuthor: false, showStory: false })).join('')}</div>` : `
        <div style="text-align:center;padding:60px 20px;background:var(--card-bg);border-radius:16px;border:1px dashed var(--border-strong);">
          <div style="font-size:15px;color:var(--muted);margin-bottom:16px;">You haven't shared any recipes yet.</div>
          <button data-action="go-upload" class="btn btn-accent">Publish your first recipe</button>
        </div>`}

  // ---------- actions ----------

  async function goBrowse() {
    setState({ screen: 'browse', filterPanelOpen: false });
    const data = await api('/recipes');
    setState({ recipes: data.recipes });
  }

  async function openRecipe(id) {
    setState({ screen: 'detail', filterPanelOpen: false, selectedId: id, selectedRecipe: null });
    const data = await api('/recipes/' + id);
    setState({ selectedRecipe: data.recipe });
  }

  async function reloadDetail() {
    const data = await api('/recipes/' + state.selectedId);
    setState({ selectedRecipe: data.recipe });
  }

  async function goProfile() {
    setState({ screen: 'profile', filterPanelOpen: false });
    const data = await api('/me/recipes');
    setState({ myRecipes: data.recipes, myRecipeCount: data.recipes.length });
  }

  function goUpload() {
    setState({
      screen: 'upload', filterPanelOpen: false, uploadMode: 'own', draftError: '',
      draft: { title: '', story: '', cookTime: '', servings: '', difficulty: 'Easy', diet: 'omnivore', ingredients: [''], steps: [''], heroKind: 'photo', aiVariant: 0, sourceUrl: '' },
    });
  }

  function recipeUrl(r) {
    const slug = r.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    return `${location.origin}/r/${slug}`;
  }

  function syncFormArraysFromDom(kind) {
    document.querySelectorAll(`[data-row="${kind}"]`).forEach((el) => {
      const i = Number(el.getAttribute('data-index'));
      state.draft[kind === 'ingredient' ? 'ingredients' : 'steps'][i] = el.value;
    });
  }

  // Any button click on the upload screen (add/remove row, switch tab, hero
  // picker) triggers a full render(), which would otherwise wipe whatever the
  // user already typed into uncontrolled fields. Pull the current DOM values
  // back into state.draft first so nothing is lost.
  function syncDraftFromForm() {
    const form = document.querySelector('form[data-form="recipe"]');
    if (!form) return;
    const d = state.draft;
    const read = (name) => form.querySelector(`[name="${name}"]`);
    ['title', 'story', 'cookTime', 'servings', 'difficulty', 'diet', 'sourceUrl'].forEach((name) => {
      const el = read(name);
      if (el) d[name] = el.value;
    });
    syncFormArraysFromDom('ingredient');
    syncFormArraysFromDom('step');
  }

  // YouTube extraction runs a real transcription + AI pipeline server-side
  // and can take up to ~60s, so the progress bar ramps slowly over that
  // window (never reaching 100 on its own) while the actual request is in
  // flight, then snaps to 100 the moment the real response comes back.
  // Link (website) extraction is still mocked and fast, so it keeps a short
  // fixed ramp.
  async function startExtraction(mode, draftSnapshot) {
    clearInterval(extractTimer);
    const startedAt = Date.now();
    const rampSeconds = mode === 'youtube' ? 55 : 2;
    setState({ extracting: true, extractProgress: 6, extractMode: mode });
    extractTimer = setInterval(() => {
      const elapsed = (Date.now() - startedAt) / 1000;
      const target = 6 + (90 - 6) * Math.min(1, elapsed / rampSeconds);
      state.extractProgress = Math.max(state.extractProgress, target);
      render();
    }, 300);

    try {
      const data = await api('/recipes', { method: 'POST', body: {
        title: draftSnapshot.title, story: draftSnapshot.story, diet: draftSnapshot.diet,
        sourceType: mode, sourceUrl: draftSnapshot.sourceUrl,
        heroKind: draftSnapshot.heroKind, aiVariant: draftSnapshot.aiVariant,
      } });
      clearInterval(extractTimer);
      state.extractProgress = 100;
      render();
      await new Promise((r) => setTimeout(r, 300));
      setState({ extracting: false, extractProgress: 0 });
      showToast(mode === 'youtube' ? 'Recipe extracted from the video and published!' : 'Recipe extracted from the page and published!');
      await openRecipe(data.id);
    } catch (err) {
      clearInterval(extractTimer);
      setState({ extracting: false, extractProgress: 0, screen: 'upload', draftError: err.message });
      showToast(err.message, 'error');
    }
  }

  // ---------- event delegation ----------

  app.addEventListener('click', async (e) => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.getAttribute('data-action');
    const UPLOAD_FORM_ACTIONS = new Set([
      'set-mode-own', 'set-mode-youtube', 'set-mode-link',
      'generate-ai', 'regenerate-ai', 'use-own-photo',
      'add-ingredient', 'remove-ingredient', 'add-step', 'remove-step',
    ]);
    try {
      if (state.screen === 'upload' && UPLOAD_FORM_ACTIONS.has(action)) syncDraftFromForm();
      switch (action) {
        case 'set-login-mode': setState({ authMode: 'login', authError: '' }); break;
        case 'set-signup-mode': setState({ authMode: 'signup', authError: '' }); break;
        case 'enter-app': await goBrowse(); break;
        case 'go-browse': await goBrowse(); break;
        case 'go-upload': goUpload(); break;
        case 'go-profile': await goProfile(); break;
        case 'logout': {
          await api('/logout', { method: 'POST' });
          setState({ currentUser: null, screen: 'login', authMode: 'login', authError: '' });
          break;
        }
        case 'open-recipe': await openRecipe(Number(el.getAttribute('data-id'))); break;
        case 'toggle-filter-panel': setState({ filterPanelOpen: !state.filterPanelOpen }); break;
        case 'clear-filters': setState({ sortRecent: false, veganOnly: false, vegetarianOnly: false, ingredientQuery: '', query: '' }); break;
        case 'rate': {
          if (!state.currentUser) { showToast('Log in to rate recipes.'); break; }
          const n = Number(el.getAttribute('data-n'));
          const data = await api(`/recipes/${state.selectedId}/rating`, { method: 'PUT', body: { stars: n } });
          state.selectedRecipe.avg = data.avg;
          state.selectedRecipe.ratingCount = data.ratingCount;
          state.selectedRecipe.myRating = data.myRating;
          render();
          break;
        }
        case 'copy-link': {
          const url = recipeUrl(state.selectedRecipe);
          try { await navigator.clipboard.writeText(url); } catch (err) {}
          showToast('Link copied to clipboard');
          break;
        }
        case 'share-whatsapp': {
          const r = state.selectedRecipe;
          window.open(`https://wa.me/?text=${encodeURIComponent('Check out this recipe: ' + r.title + ' ' + recipeUrl(r))}`, '_blank');
          break;
        }
        case 'share-x': {
          const r = state.selectedRecipe;
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(r.title)}&url=${encodeURIComponent(recipeUrl(r))}`, '_blank');
          break;
        }
        case 'native-share': {
          const r = state.selectedRecipe;
          if (navigator.share) { try { await navigator.share({ title: r.title, url: recipeUrl(r) }); } catch (err) {} }
          else { try { await navigator.clipboard.writeText(recipeUrl(r)); } catch (err) {} showToast('Link copied to clipboard'); }
          break;
        }
        case 'set-mode-own': setState({ uploadMode: 'own', draftError: '' }); break;
        case 'set-mode-youtube': setState({ uploadMode: 'youtube', draftError: '' }); break;
        case 'set-mode-link': setState({ uploadMode: 'link', draftError: '' }); break;
        case 'generate-ai': state.draft.heroKind = 'ai'; state.draft.aiVariant = Math.floor(Math.random() * AI_GRADIENTS.length); render(); break;
        case 'regenerate-ai': state.draft.aiVariant = (state.draft.aiVariant + 1) % AI_GRADIENTS.length; render(); break;
        case 'use-own-photo': state.draft.heroKind = 'photo'; render(); break;
        case 'add-ingredient': syncFormArraysFromDom('ingredient'); state.draft.ingredients.push(''); render(); break;
        case 'remove-ingredient': {
          syncFormArraysFromDom('ingredient');
          const i = Number(el.getAttribute('data-index'));
          state.draft.ingredients.splice(i, 1);
          if (state.draft.ingredients.length === 0) state.draft.ingredients.push('');
          render();
          break;
        }
        case 'add-step': syncFormArraysFromDom('step'); state.draft.steps.push(''); render(); break;
        case 'remove-step': {
          syncFormArraysFromDom('step');
          const i = Number(el.getAttribute('data-index'));
          state.draft.steps.splice(i, 1);
          if (state.draft.steps.length === 0) state.draft.steps.push('');
          render();
          break;
        }
      }
    } catch (err) {
      showToast(err.message || 'Something went wrong.');
    }
  });

  app.addEventListener('input', (e) => {
    const live = e.target.getAttribute && e.target.getAttribute('data-live');
    if (!live) return;
    state[live] = e.target.value;
    refreshGrid();
  });

  app.addEventListener('change', (e) => {
    const toggle = e.target.getAttribute && e.target.getAttribute('data-toggle');
    if (!toggle) return;
    state[toggle] = e.target.checked;
    render();
  });

  app.addEventListener('submit', async (e) => {
    const form = e.target.closest('form[data-form]');
    if (!form) return;
    e.preventDefault();
    const kind = form.getAttribute('data-form');
    try {
      if (kind === 'auth') {
        const fd = new FormData(form);
        const name = (fd.get('name') || '').toString();
        const email = (fd.get('email') || '').toString();
        const password = (fd.get('password') || '').toString();
        if (!email.trim() || !password.trim()) { setState({ authError: 'Please fill in email and password.' }); return; }
        if (state.authMode === 'signup' && !name.trim()) { setState({ authError: 'Please tell us your name.' }); return; }
        try {
          const data = state.authMode === 'signup'
            ? await api('/register', { method: 'POST', body: { name, email, password } })
            : await api('/login', { method: 'POST', body: { email, password } });
          setState({ currentUser: data.user, authError: '', screen: state.authMode === 'signup' ? 'welcome' : 'browse' });
          if (state.screen === 'browse') { const d = await api('/recipes'); setState({ recipes: d.recipes }); }
        } catch (err) {
          setState({ authError: err.message });
        }
      } else if (kind === 'comment') {
        const fd = new FormData(form);
        const text = (fd.get('text') || '').toString().trim();
        if (!text) return;
        await api(`/recipes/${state.selectedId}/comments`, { method: 'POST', body: { text } });
        form.reset();
        await reloadDetail();
      } else if (kind === 'recipe') {
        syncFormArraysFromDom('ingredient');
        syncFormArraysFromDom('step');
        const fd = new FormData(form);
        const d = state.draft;
        d.title = (fd.get('title') || '').toString();
        d.story = (fd.get('story') || '').toString();
        if (fd.has('sourceUrl')) d.sourceUrl = (fd.get('sourceUrl') || '').toString();
        if (fd.has('cookTime')) d.cookTime = (fd.get('cookTime') || '').toString();
        if (fd.has('servings')) d.servings = (fd.get('servings') || '').toString();
        if (fd.has('difficulty')) d.difficulty = (fd.get('difficulty') || '').toString();
        if (fd.has('diet')) d.diet = (fd.get('diet') || '').toString();

        if (!d.title.trim()) { setState({ draftError: 'Please add a title.' }); return; }

        if (state.uploadMode === 'own') {
          const ingredients = d.ingredients.map((x) => x.trim()).filter(Boolean);
          const steps = d.steps.map((x) => x.trim()).filter(Boolean);
          if (ingredients.length === 0 || steps.length === 0) {
            setState({ draftError: 'Please add a title, at least one ingredient and one step.' });
            return;
          }
          setState({ draftError: '' });
          const data = await api('/recipes', { method: 'POST', body: {
            title: d.title, story: d.story, cookTime: d.cookTime, servings: d.servings,
            difficulty: d.difficulty, diet: d.diet, sourceType: 'own',
            heroKind: d.heroKind, aiVariant: d.aiVariant, ingredients, steps,
          } });
          showToast('Recipe published!');
          await openRecipe(data.id);
        } else {
          if (!d.sourceUrl.trim() || !/^https?:\/\//i.test(d.sourceUrl.trim())) {
            setState({ draftError: 'Please add a valid link starting with http:// or https://' });
            return;
          }
          const ytId = /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/.exec(d.sourceUrl);
          if (state.uploadMode === 'youtube' && !ytId) {
            setState({ draftError: "That doesn't look like a valid YouTube link." });
            return;
          }
          setState({ draftError: '' });
          startExtraction(state.uploadMode, { ...d });
        }
      }
    } catch (err) {
      if (kind === 'recipe') setState({ draftError: err.message });
      else showToast(err.message || 'Something went wrong.');
    }
  });

  // ---------- boot ----------

  (async function boot() {
    try {
      const me = await api('/me');
      if (me.user) {
        state.currentUser = me.user;
        state.myRecipeCount = me.recipeCount || 0;
        await goBrowse();
      } else {
        setState({ screen: 'login' });
      }
    } catch (err) {
      setState({ screen: 'login' });
    }
  })();
})();
</script>
</body>
</html>
